services:
  postgres:
    image: postgres:16-alpine
    container_name: rf-postgres
    environment:
      POSTGRES_USER: relayforge
      POSTGRES_PASSWORD: relayforge_dev
      POSTGRES_DB: relayforge
    ports:
      - '5432:5432'
    volumes:
      - rf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U relayforge']
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: rf-valkey
    ports:
      - '6379:6379'
    volumes:
      - rf-valkeydata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rf-miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/relay-uploads;
      mc mb --ignore-existing local/relay-avatars;
      mc mb --ignore-existing local/relay-emoji;
      mc anonymous set download local/relay-avatars;
      mc anonymous set download local/relay-emoji;
      echo 'Buckets initialized';
      "

  livekit:
    image: livekit/livekit-server:latest
    container_name: rf-livekit
    command: --config /etc/livekit.yaml
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    volumes:
      - ./livekit-dev.yaml:/etc/livekit.yaml
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7880']
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: rf-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  rf-pgdata:
  rf-valkeydata:
  rf-miniodata:
