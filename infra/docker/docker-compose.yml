x-common-env: &common-env
  RELAY_ENV: production
  RELAY_LOG_LEVEL: info
  RELAY_LOG_FORMAT: json
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-relayforge}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_NAME: ${DB_NAME:-relayforge}
  DB_SSL_MODE: ${DB_SSL_MODE:-disable}
  VALKEY_HOST: valkey
  VALKEY_PORT: 6379
  VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
  S3_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-relay-uploads}
  S3_BUCKET_AVATARS: ${S3_BUCKET_AVATARS:-relay-avatars}
  S3_BUCKET_EMOJI: ${S3_BUCKET_EMOJI:-relay-emoji}
  S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
  LIVEKIT_URL: ${LIVEKIT_INTERNAL_URL:-ws://livekit:7880}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-relayforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-relayforge}
    volumes:
      - rf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-relayforge}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --requirepass "${VALKEY_PASSWORD:-}"
    volumes:
      - rf-valkeydata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rf-miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET_UPLOADS:-relay-uploads};
      mc mb --ignore-existing local/${S3_BUCKET_AVATARS:-relay-avatars};
      mc mb --ignore-existing local/${S3_BUCKET_EMOJI:-relay-emoji};
      mc anonymous set download local/${S3_BUCKET_AVATARS:-relay-avatars};
      mc anonymous set download local/${S3_BUCKET_EMOJI:-relay-emoji};
      echo 'Buckets initialized';
      "
    restart: 'no'

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    volumes:
      - ./livekit-dev.yaml:/etc/livekit.yaml
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7880']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: relayforge/api:${VERSION:-latest}
    pull_policy: never
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      <<: *common-env
      API_HOST: 0.0.0.0
      API_PORT: 8080
      API_BASE_URL: ${API_BASE_URL:?API_BASE_URL is required}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-}
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  realtime:
    image: relayforge/realtime:${VERSION:-latest}
    pull_policy: never
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.realtime
    environment:
      <<: *common-env
      REALTIME_HOST: 0.0.0.0
      REALTIME_PORT: 8081
    ports:
      - '8081:8081'
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8081/healthz']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  media:
    image: relayforge/media:${VERSION:-latest}
    pull_policy: never
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.media
    environment:
      <<: *common-env
      MEDIA_HOST: 0.0.0.0
      MEDIA_PORT: 8082
    ports:
      - '8082:8082'
    depends_on:
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8082/healthz']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    image: relayforge/worker:${VERSION:-latest}
    pull_policy: never
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rf-pgdata:
  rf-valkeydata:
  rf-miniodata:
